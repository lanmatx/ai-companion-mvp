<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Recent Entries</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f5f2;
      color: #333;
      margin: 0;
      padding: 24px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #333;
    }

    .subtext {
      margin-bottom: 24px;
      color: #666;
    }

    .entry {
      background: #fff;
      border-left: 5px solid #f05a00;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .meta {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 8px;
    }

    .type {
      font-weight: bold;
      text-transform: capitalize;
    }

    .type.win,
    .type.wins {
      color: #2e7d32;
    }

    .type.milestone,
    .type.milestones {
      color: #1565c0;
    }

    .type.struggle,
    .type.struggles {
      color: #c62828;
    }

    .type.progress,
    .type.progress-note {
      color: #6a1b9a;
    }

    .text {
      font-size: 1.05rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .empty,
    .error,
    .loading {
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #f05a00;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="page-title">Here’s your recent progress</h1>
    <div class="subtext">Your latest wins, struggles, milestones, and progress notes.</div>
    <div id="summary" class="subtext"></div>

    <div id="notes-container" class="loading">Loading your notes...</div>

    <a id="back-link" class="back-link" href="https://chat.embraceustudio.com/">← Back to your companion</a>
  </div>

  <script>
    const container = document.getElementById("notes-container");
    const pageTitle = document.getElementById("page-title");
    const backLink = document.getElementById("back-link");
    const summary = document.getElementById("summary");

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return (params.get(name) || "").trim();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDate(dateString) {
      if (!dateString) return "No date";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "No date";

      return date.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function normalizeType(type) {
      return (type || "").toLowerCase().replace(/\s+/g, "-");
    }

    const userId =
      getQueryParam("user_id") ||
      localStorage.getItem("user_id") ||
      "";

    const firstName =
      getQueryParam("first_name") ||
      localStorage.getItem("first_name") ||
      "";

    const companionName =
      getQueryParam("companion_name") ||
      localStorage.getItem("companion_name") ||
      "your companion";

    if (firstName) {
      pageTitle.textContent = `Hi ${firstName} — here’s your recent progress`;
    } else {
      pageTitle.textContent = "Here’s your recent progress";
    }

    backLink.textContent = `← Back to ${companionName}`;
    backLink.href = "https://chat.embraceustudio.com/";

    if (!userId) {
      summary.textContent = "";
      container.className = "error";
      container.textContent = "Could not identify your account to load notes.";
      console.error("Missing user_id for notes page.");
    } else {
      fetch("/api/get-notes", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          user_id: String(userId)
        })
      })
        .then(async (response) => {
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Failed to load notes");
          }

          const notes = data.notes || [];

          if (notes.length === 0) {
            summary.textContent = "Wins: 0 • Struggles: 0 • Milestones: 0";
            container.className = "empty";
            container.textContent = "No entries yet.";
            return;
          }

          const counts = {
            win: 0,
            struggle: 0,
            milestone: 0
          };

          notes.forEach((n) => {
            const type = (n.entry_type || "").toLowerCase();
            if (counts[type] !== undefined) counts[type]++;
          });

          summary.textContent = `Wins: ${counts.win} • Struggles: ${counts.struggle} • Milestones: ${counts.milestone}`;

          container.className = "";
          container.innerHTML = notes.map(note => `
            <div class="entry">
              <div class="meta">
                <span>${escapeHtml(formatDate(note.entry_date || note.created_at))}</span>
                &nbsp;•&nbsp;
                <span class="type ${escapeHtml(normalizeType(note.entry_type))}">${escapeHtml(note.entry_type)}</span>
              </div>
              <div class="text">${escapeHtml(note.entry_text)}</div>
            </div>
          `).join("");
        })
        .catch((error) => {
          summary.textContent = "";
          container.className = "error";
          container.textContent = "Could not load notes right now.";
          console.error("NOTES LOAD ERROR:", error);
        });
    }
  </script>
</body>
</html>
