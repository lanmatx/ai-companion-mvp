<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova — Health Companion</title>

<script>
function getOrAskEmail() {
  let email = localStorage.getItem("user_id");

  if (!email || email.includes("{{")) {
    email = prompt("Enter your email to continue:") || "";
    email = email.trim();

    if (email) {
      localStorage.setItem("user_id", email);
    }
  }
  return email;
}

(function () {
  const params = new URLSearchParams(window.location.search);

  const urlUserId = (params.get("user_id") || "").trim();
  const urlFirstName = (params.get("first_name") || "").trim();
  const urlCompanionName = (params.get("companion_name") || "").trim();
  const urlProgramType = (params.get("program_type") || "").trim();

  if (urlUserId && !urlUserId.includes("{{")) {
    localStorage.setItem("user_id", urlUserId);
  }
  if (urlFirstName && !urlFirstName.includes("{{")) {
    localStorage.setItem("first_name", urlFirstName);
  }
  if (urlCompanionName && !urlCompanionName.includes("{{")) {
    localStorage.setItem("companion_name", urlCompanionName);
  }
  if (urlProgramType && !urlProgramType.includes("{{")) {
    localStorage.setItem("program_type", urlProgramType);
  }

  getOrAskEmail();
})();
</script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

.wrap {
  max-width: 760px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: #ff4a00;
  border-radius: 18px;
  padding: 28px 24px;
  color: white;
}

.chatbox {
  background: white;
  color: #222;
  border-radius: 16px;
  padding: 16px;
  min-height: 320px;
  max-height: 460px;
  overflow-y: auto;
  margin-bottom: 16px;
}

.msg {
  margin-bottom: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
}

.neville {
  background: #fff4ec;
  border-left: 4px solid #ff4a00;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: #f1f1f1;
  border-left: 4px solid #999;
  padding: 10px;
  border-radius: 10px;
}

.voice-toggle {
  background: white;
  color: #ff4a00;
  border: none;
  border-radius: 10px;
  padding: 8px 12px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<h1 id="heroTitle">Hi, I’m your health companion</h1>

<button id="voiceToggle" class="voice-toggle">🔊 Voice: Off</button>

<div id="chatbox" class="chatbox"></div>

<textarea id="messageInput" placeholder="Type your message..."></textarea>
<button onclick="sendMessage()">Send</button>

</div>
</div>

<script>
const chatbox = document.getElementById("chatbox");
const input = document.getElementById("messageInput");
const heroTitle = document.getElementById("heroTitle");
const voiceToggle = document.getElementById("voiceToggle");

// ===== VOICE SYSTEM =====
let voiceEnabled = localStorage.getItem("voice_enabled") === "true";

updateVoiceButton();

function updateVoiceButton() {
  voiceToggle.textContent = voiceEnabled ? "🔊 Voice: On" : "🔇 Voice: Off";
}

voiceToggle.onclick = () => {
  voiceEnabled = !voiceEnabled;
  localStorage.setItem("voice_enabled", voiceEnabled);
  updateVoiceButton();
};

function speak(text) {
  if (!voiceEnabled) return;

  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 1;
  utterance.pitch = 1;

  speechSynthesis.speak(utterance);
}

// ===== CORE FUNCTIONS =====

function getUserId() {
  return localStorage.getItem("user_id");
}

function getFirstName() {
  return localStorage.getItem("first_name") || "";
}

function getCompanionName() {
  return localStorage.getItem("companion_name") || "Nova";
}

function updateHeader() {
  const name = getFirstName();
  const companion = getCompanionName();

  heroTitle.textContent = name
    ? `Hi ${name}, I’m ${companion} — your health companion`
    : `Hi, I’m ${companion}`;
}

function addMessage(sender, text, type) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.innerHTML = `<strong>${sender}:</strong><br>${text}`;
  chatbox.appendChild(div);
  chatbox.scrollTop = chatbox.scrollHeight;

  // 🔊 SPEAK ONLY NOVA
  if (type === "neville" && !text.includes("Thinking")) {
    speak(text);
  }
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  input.value = "";
  addMessage("You", message, "user");

  addMessage(getCompanionName(), "Thinking...", "neville");

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message,
      user_id: getUserId(),
      first_name: getFirstName(),
      companion_name: getCompanionName()
    })
  });

  const data = await response.json();

  document.querySelector(".loading")?.remove();

  addMessage(getCompanionName(), data.reply || "Something went wrong", "neville");
}

// ===== INIT =====
updateHeader();
</script>

</body>
</html>
